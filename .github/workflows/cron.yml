name: Cron Job

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Run cron job
        run: |
          curl -X GET "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/cron" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
