workflows:
  ios-workflow:
    name: Lattice iOS
    max_build_duration: 60
    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.lattice.protocol"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios@6 @capacitor/cli@6 @capacitor/core@6
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set app icon
        script: |
          ICON_SET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          cp public/app-icon-1024.png "$ICON_SET/AppIcon-512@2x.png"
          cat > "$ICON_SET/Contents.json" << 'ICONEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-512@2x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONEOF
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          cat /tmp/api_key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          cd ios/App
          LATEST=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" || echo 0)
          agvtool new-version -all $(($LATEST + 1))
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
