workflows:
  ios-workflow:
    name: Lattice iOS
    max_build_duration: 60
    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.lattice.protocol"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build Next.js for Capacitor static export
        script: |
          npm run build:capacitor
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Rewrite CapacitorFirebaseAuthentication podspec (remove broken subspec, force Google)
        script: |
          set -e
          PODSPEC="node_modules/@capacitor-firebase/authentication/CapacitorFirebaseAuthentication.podspec"
          cat > "$PODSPEC" <<'PODSPEC_EOF'
          require 'json'

          package = JSON.parse(File.read(File.join(__dir__, 'package.json')))

          Pod::Spec.new do |s|
            s.name = 'CapacitorFirebaseAuthentication'
            s.version = package['version']
            s.summary = package['description']
            s.license = package['license']
            s.homepage = package['repository']['url']
            s.author = package['author']
            s.source = { :git => package['repository']['url'], :tag => s.version.to_s }
            s.source_files = 'ios/Plugin/**/*.{swift,h,m,c,cc,mm,cpp}'
            s.ios.deployment_target = '15.0'
            s.dependency 'Capacitor'
            s.dependency 'FirebaseAuth', '~> 12.7.0'
            s.dependency 'GoogleSignIn', '9.0.0'
            s.xcconfig = { 'OTHER_SWIFT_FLAGS' => '$(inherited) -DRGCFA_INCLUDE_GOOGLE' }
            s.swift_version = '5.1'
            s.static_framework = true
          end
          PODSPEC_EOF
          echo "--- Rewrote podspec ---"
          cat "$PODSPEC"
      - name: Force Podfile to use plain CapacitorFirebaseAuthentication (no subspec)
        script: |
          set -e
          PODFILE="ios/App/Podfile"
          sed -i.bak "s|pod 'CapacitorFirebaseAuthentication/Google', :path|pod 'CapacitorFirebaseAuthentication', :path|" "$PODFILE"
          rm -f "$PODFILE.bak"
          echo "--- Podfile after normalization ---"
          grep -n "CapacitorFirebaseAuthentication" "$PODFILE"
      - name: Clean Pods + Podfile.lock (podspec structure changed)
        script: |
          cd ios/App
          rm -rf Pods Podfile.lock
          echo "Pods directory and Podfile.lock removed for fresh resolution"
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update
      - name: Verify GoogleAuthProviderHandler patch is applied
        script: |
          set -e

          NODE_FILE="node_modules/@capacitor-firebase/authentication/ios/Plugin/Handlers/GoogleAuthProviderHandler.swift"
          PODS_FILE="ios/App/Pods/CapacitorFirebaseAuthentication/ios/Plugin/Handlers/GoogleAuthProviderHandler.swift"

          echo "=== Checking node_modules version ==="
          if [ -f "$NODE_FILE" ]; then
            echo "File exists at: $NODE_FILE"
            echo "--- Searching for DIAG markers ---"
            grep -n "DIAG-" "$NODE_FILE" || echo "NO DIAG MARKERS FOUND IN NODE_MODULES"
            echo ""
            echo "--- Line count ---"
            wc -l "$NODE_FILE"
          else
            echo "ERROR: File does not exist at $NODE_FILE"
          fi

          echo ""
          echo "=== Checking Pods version ==="
          if [ -f "$PODS_FILE" ]; then
            echo "File exists at: $PODS_FILE"
            echo "--- Searching for DIAG markers ---"
            grep -n "DIAG-" "$PODS_FILE" || echo "NO DIAG MARKERS FOUND IN PODS"
            echo ""
            echo "--- Line count ---"
            wc -l "$PODS_FILE"
          else
            echo "WARNING: Pods file does not exist at $PODS_FILE"
            echo "Searching for the file in alternative locations..."
            find ios/App/Pods -name "GoogleAuthProviderHandler.swift" 2>/dev/null || echo "Not found anywhere in Pods"
          fi

          echo ""
          echo "=== Diff between node_modules and Pods versions ==="
          if [ -f "$NODE_FILE" ] && [ -f "$PODS_FILE" ]; then
            diff "$NODE_FILE" "$PODS_FILE" && echo "FILES ARE IDENTICAL" || echo "FILES DIFFER (see above)"
          fi

          echo ""
          echo "=== Pods directory structure (depth 2) ==="
          find ios/App/Pods -type d -maxdepth 2 2>/dev/null | head -50 || echo "Pods directory does not exist"

          echo ""
          echo "=== Search for GoogleAuthProviderHandler.swift anywhere under ios/ ==="
          find ios -name "GoogleAuthProviderHandler.swift" 2>/dev/null || echo "Not found"

          echo ""
          echo "=== Podfile contents ==="
          cat ios/App/Podfile

          echo ""
          echo "=== Podfile.lock (first 100 lines) ==="
          if [ -f ios/App/Podfile.lock ]; then
            head -100 ios/App/Podfile.lock
          else
            echo "Podfile.lock not present"
          fi

          echo ""
          echo "=== Capacitor Firebase Authentication xcconfig ==="
          find ios/App/Pods -path "*CapacitorFirebaseAuth*" -name "*.xcconfig" 2>/dev/null | head -5 | while read f; do
            echo "--- $f ---"
            cat "$f"
          done

          echo ""
          echo "=== Search for any GoogleAuthProviderHandler reference in Pods ==="
          grep -rn "GoogleAuthProviderHandler" ios/App/Pods/ 2>/dev/null | head -20 || echo "No references found"
          echo ""
          echo "=== FirebaseAuthenticationPlugin.swift in pbxproj ==="
          grep -c "FirebaseAuthenticationPlugin.swift" ios/App/Pods/Pods.xcodeproj/project.pbxproj || echo "0 matches"
          echo ""
          echo "=== All capacitor-firebase/authentication file refs in pbxproj ==="
          grep -n "capacitor-firebase/authentication\|FirebaseAuthenticationPlugin\|GoogleAuthProviderHandler" ios/App/Pods/Pods.xcodeproj/project.pbxproj 2>/dev/null | head -20 || echo "No matches"
          echo ""
          echo "=== List all .swift files compiled in Pods (top 30) ==="
          grep -o '[A-Za-z]*\.swift' ios/App/Pods/Pods.xcodeproj/project.pbxproj 2>/dev/null | sort -u | head -30 || echo "No swift files"
      - name: Force inject GoogleService-Info.plist into Xcode project
        script: |
          cd ios/App
          gem install xcodeproj --no-document
          ruby <<'RUBY'
          require "xcodeproj"

          project_path = "App.xcodeproj"
          project = Xcodeproj::Project.open(project_path)

          target = project.targets.find { |t| t.name == "App" }
          raise "App target not found" unless target

          app_group = project.main_group["App"]
          raise "App group not found" unless app_group

          file_ref = app_group.files.find { |f| f.path == "GoogleService-Info.plist" }

          if file_ref.nil?
            file_ref = app_group.new_reference("GoogleService-Info.plist")
            puts "Created new file reference for GoogleService-Info.plist"
          else
            puts "File reference already exists"
          end

          resources_phase = target.resources_build_phase
          already_in_resources = resources_phase.files.any? { |bf|
            bf.file_ref && bf.file_ref.path == "GoogleService-Info.plist"
          }

          if already_in_resources
            puts "Already in Resources build phase, skipping"
          else
            resources_phase.add_file_reference(file_ref)
            puts "Added GoogleService-Info.plist to Resources build phase"
          end

          project.save
          puts "project.pbxproj saved"

          plist_path = File.join("App", "GoogleService-Info.plist")
          if File.exist?(plist_path)
            puts "Verified: #{plist_path} exists on disk"
          else
            raise "ERROR: #{plist_path} does not exist on disk"
          end
          RUBY
      - name: Force set CODE_SIGN_ENTITLEMENTS in Xcode project
        script: |
          cd ios/App
          ruby <<'RUBY'
          require "xcodeproj"
          project = Xcodeproj::Project.open("App.xcodeproj")
          target = project.targets.find { |t| t.name == "App" }
          raise "App target not found" unless target
          target.build_configurations.each do |config|
            config.build_settings["CODE_SIGN_ENTITLEMENTS"] = "App/App.entitlements"
            puts "Set CODE_SIGN_ENTITLEMENTS for #{config.name}"
          end
          project.save
          puts "Saved project.pbxproj with CODE_SIGN_ENTITLEMENTS"
          RUBY
      - name: Set app icon
        script: |
          ICON_SET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          cp public/app-icon-1024.png "$ICON_SET/AppIcon-512@2x.png"
          cat > "$ICON_SET/Contents.json" << 'ICONEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-512@2x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONEOF
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          PLIST="ios/App/App/Info.plist"
          BUILD_NUM=$BUILD_NUMBER
          plutil -replace CFBundleVersion -string "$BUILD_NUM" "$PLIST"
      - name: Force inject Google REVERSED_CLIENT_ID into Info.plist URL schemes
        script: |
          python3 <<'PYEOF'
          import plistlib
          import sys

          gs_path = "ios/App/App/GoogleService-Info.plist"
          info_path = "ios/App/App/Info.plist"

          with open(gs_path, "rb") as f:
              gs = plistlib.load(f)
          reversed_client_id = gs.get("REVERSED_CLIENT_ID")
          if not reversed_client_id:
              print("ERROR: REVERSED_CLIENT_ID not found in GoogleService-Info.plist", file=sys.stderr)
              sys.exit(1)
          print(f"REVERSED_CLIENT_ID: {reversed_client_id}")

          with open(info_path, "rb") as f:
              info = plistlib.load(f)

          if "CFBundleURLTypes" not in info:
              info["CFBundleURLTypes"] = []

          url_types = info["CFBundleURLTypes"]

          target_dict = None
          for d in url_types:
              if isinstance(d, dict) and "CFBundleURLSchemes" in d:
                  target_dict = d
                  break

          if target_dict is None:
              target_dict = {"CFBundleURLSchemes": []}
              url_types.append(target_dict)

          schemes = target_dict.get("CFBundleURLSchemes", [])
          if not isinstance(schemes, list):
              schemes = []

          if reversed_client_id in schemes:
              print(f"Already present, skipping: {reversed_client_id}")
          else:
              schemes.append(reversed_client_id)
              target_dict["CFBundleURLSchemes"] = schemes
              print(f"Added: {reversed_client_id}")

          with open(info_path, "wb") as f:
              plistlib.dump(info, f)

          with open(info_path, "rb") as f:
              verified = plistlib.load(f)
          all_schemes = []
          for d in verified.get("CFBundleURLTypes", []):
              if isinstance(d, dict):
                  all_schemes.extend(d.get("CFBundleURLSchemes", []))
          print(f"Final URL schemes in Info.plist: {all_schemes}")

          if reversed_client_id not in all_schemes:
              print("ERROR: Verification failed", file=sys.stderr)
              sys.exit(1)

          print("OK: Info.plist updated successfully")
          PYEOF
      - name: Debug Info.plist state before Build iOS
        script: |
          echo "=== Info.plist contents (XML form) ==="
          plutil -convert xml1 -o - ios/App/App/Info.plist
          echo "=== End ==="
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
