workflows:
  ios-workflow:
    name: Lattice iOS
    max_build_duration: 60
    environment:
      groups:
        - ios
      vars:
        BUNDLE_ID: "com.lattice.protocol"
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/ios@6 @capacitor/cli@6 @capacitor/core@6
          npm install @capacitor/push-notifications@6
      - name: Add iOS platform
        script: npx cap add ios || true
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set app icon
        script: |
          ICON_SET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          cp public/app-icon-1024.png "$ICON_SET/AppIcon-512@2x.png"
          cat > "$ICON_SET/Contents.json" << 'ICONEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-512@2x.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          ICONEOF
      - name: Add Push Notification entitlement
        script: |
          ENTITLEMENTS="ios/App/App/App.entitlements"
          cat > "$ENTITLEMENTS" << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>aps-environment</key>
            <string>production</string>
          </dict>
          </plist>
          ENTEOF
          cd ios/App
          PBXPROJ="App.xcodeproj/project.pbxproj"
          if ! grep -q "CODE_SIGN_ENTITLEMENTS" "$PBXPROJ"; then
            sed -i '' 's/CODE_SIGN_IDENTITY/CODE_SIGN_ENTITLEMENTS = "App\/App.entitlements";\n\t\t\t\tCODE_SIGN_IDENTITY/g' "$PBXPROJ"
          fi
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch signing files
        script: |
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          cat /tmp/api_key.p8
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --private-key @file:/tmp/api_key.p8 \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Increment build number
        script: |
          PLIST="ios/App/App/Info.plist"
          BUILD_NUM=$BUILD_NUMBER
          plutil -replace CFBundleVersion -string "$BUILD_NUM" "$PLIST"
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true